<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEAOS Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Root: Brutalist Technical Palette ── */
:root {
  --bg: #080c14;
  --surface: #111827;
  --surface2: #1e293b;
  --surface3: #273449;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --amber: #F59E0B;
  --amber-dim: #92400E;
  --cyan: #06B6D4;
  --cyan-dim: #0E7490;
  --green: #10B981;
  --red: #EF4444;
  --yellow: #FBBF24;
  --sidebar: 230px;
  --glow: 0 0 20px rgba(245,158,11,.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter Tight', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}
/* Grid overlay */
body::before {
  content: '';
  position: fixed; inset:0;
  background-image:
    linear-gradient(rgba(245,158,11,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,158,11,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar);
  background: linear-gradient(180deg, #0f172a 0%, #0a0f1e 100%);
  border-right: 1px solid var(--surface2);
  display: flex;
  flex-direction: column;
  position: fixed;
  top:0; left:0; height:100vh; z-index:2;
  overflow-y:auto;
}
.sidebar .logo {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--surface2);
  margin-bottom: 8px;
}
.sidebar .logo h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: -.5px;
}
.sidebar .logo h1 span { color: var(--cyan); }
.sidebar .logo small {
  display:block;
  font-size: 11px;
  font-weight: 400;
  color: var(--text3);
  margin-top: 4px;
}
.sidebar a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  color: var(--text2);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  border-left: 3px solid transparent;
  position: relative;
}
.sidebar a .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: transparent;
  transition: all .2s;
}
.sidebar a:hover { color: var(--text); background: rgba(245,158,11,.05); }
.sidebar a.active {
  color: var(--amber);
  background: rgba(245,158,11,.08);
  border-left-color: var(--amber);
}
.sidebar a.active .dot { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

/* ── Main Content ── */
.main {
  margin-left: var(--sidebar);
  flex: 1;
  padding: 40px;
  max-width: calc(100vw - var(--sidebar));
  position: relative;
  z-index: 1;
}
.page { display: none; animation: fadeIn .35s ease-out; }
.page.active { display: block; }

@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* ── Typography ── */
h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 24px;
  color: var(--text);
  letter-spacing: -.3px;
}
h1 .accent { color: var(--amber); }
h2 {
  font-size: 15px;
  font-weight: 600;
  margin: 0 0 12px;
  color: var(--cyan);
  text-transform: uppercase;
  letter-spacing: .8px;
}

/* ── Metric Cards ── */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: 14px;
  margin-bottom: 28px;
}
.card {
  background: linear-gradient(135deg, var(--surface) 0%, rgba(17,24,39,.6) 100%);
  border: 1px solid var(--surface2);
  border-radius: 10px;
  padding: 20px;
  transition: all .25s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top:0; left:0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--amber-dim), var(--amber), var(--amber-dim), transparent);
  opacity: 0;
  transition: opacity .3s;
}
.card:hover {
  border-color: rgba(245,158,11,.25);
  box-shadow: var(--glow);
  transform: translateY(-2px);
}
.card:hover::before { opacity: 1; }
.card .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--amber);
}
.card .lbl {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .4px;
}

/* ── Tables ── */
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}
thead { display: none; }
th {
  text-align: left;
  padding: 10px 14px;
  color: var(--text3);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .6px;
  background: var(--surface);
  border-bottom: 1px solid var(--surface2);
}
td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(30,41,59,.5);
  transition: background .15s;
}
tr:hover td { background: rgba(245,158,11,.03); }
td strong { color: var(--text); font-weight: 600; }

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .3px;
}
.badge-green { background: rgba(16,185,129,.15); color: var(--green); border:1px solid rgba(16,185,129,.3); }
.badge-red { background: rgba(239,68,68,.15); color: var(--red); border:1px solid rgba(239,68,68,.3); }
.badge-yellow { background: rgba(251,191,36,.15); color: var(--yellow); border:1px solid rgba(251,191,36,.3); }
.badge-blue { background: rgba(6,182,212,.12); color: var(--cyan); border:1px solid rgba(6,182,212,.25); }
.badge-amber { background: rgba(245,158,11,.12); color: var(--amber); border:1px solid rgba(245,158,11,.25); }

/* ── Utilities ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.glass {
  background: rgba(17,24,39,.5);
  backdrop-filter: blur(12px);
  border: 1px solid var(--surface2);
  border-radius: 10px;
  padding: 20px;
}
pre {
  background: var(--surface);
  padding: 16px;
  border-radius: 8px;
  overflow: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  max-height: 400px;
  border: 1px solid var(--surface2);
  color: var(--text2);
}
code {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(245,158,11,.08);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 12px;
  color: var(--amber);
}
.pct-bar {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 6px;
}
.pct-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--amber));
  border-radius: 2px;
  transition: width .6s ease;
}
.status-dot {
  display:inline-block;
  width:8px; height:8px;
  border-radius:50%;
  margin-right:6px;
  vertical-align:middle;
}
.status-dot.on { background:var(--green); box-shadow:0 0 6px rgba(16,185,129,.4); }
.status-dot.off { background:var(--red); }

/* ── Empty State ── */
.empty { color: var(--text3); font-size: 13px; padding: 16px 0; }

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar { width: 64px; }
  .sidebar .logo h1 { font-size:14px; }
  .sidebar .logo small { display:none; }
  .sidebar a span { display:none; }
  .sidebar a .dot { display:none; }
  .main { margin-left:64px; padding:20px; }
  .grid-2 { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">
    <h1><span>&lt;</span>AEAOS<span>&gt;</span></h1>
    <small>Platform Console v2.0</small>
  </div>
  <a class="active" onclick="showPage('overview')"><span class="dot"></span><span>Overview</span></a>
  <a onclick="showPage('apps')"><span class="dot"></span><span>Applications</span></a>
  <a onclick="showPage('capabilities')"><span class="dot"></span><span>Capabilities</span></a>
  <a onclick="showPage('marketplace')"><span class="dot"></span><span>Marketplace</span></a>
  <a onclick="showPage('releases')"><span class="dot"></span><span>Releases</span></a>
  <a onclick="showPage('registry')"><span class="dot"></span><span>Registry</span></a>
  <a onclick="showPage('compatibility')"><span class="dot"></span><span>Compatibility</span></a>
</nav>

<div class="main" id="main"></div>

<script>
let DATA = null;

async function load() {
  try {
    const r = await fetch('data.json');
    DATA = await r.json();
    renderPages();
    showPage('overview');
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="empty">⚠ Failed to load data.json. Ensure the file is accessible.</div>`;
  }
}

const PAGES = ['overview','apps','capabilities','marketplace','releases','registry','compatibility'];
function showPage(name) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  document.querySelectorAll('.sidebar a').forEach(a => {
    const txt = a.textContent.trim();
    if(txt.startsWith(name.charAt(0).toUpperCase()) || (name==='overview' && txt.startsWith('Overview'))) a.classList.add('active');
  });
  const el = document.getElementById('page-'+name);
  if(el) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    el.classList.add('active');
  }
}

function renderPages() {
  const main = document.getElementById('main');
  main.innerHTML = PAGES.map(p => `<div class="page${p==='overview'?' active':''}" id="page-${p}"></div>`).join('');
  renderOverview();
  renderApps();
  renderCapabilities();
  renderMarketplace();
  renderReleases();
  renderRegistry();
  renderCompatibility();
}

// ── Overview ──
function renderOverview() {
  const d = DATA;
  const caps = d.capabilities || [];
  const mkt = d.marketplace || [];
  const inst = Object.keys(d.installed || {}).length;
  const rels = Object.keys(d.releases || {}).length;
  const compat = d.compatibility?.results?.length || 0;
  document.getElementById('page-overview').innerHTML = `
    <h1><span class="accent">//</span> Platform Overview</h1>
    <div class="cards">
      <div class="card"><div class="num">${caps.length}</div><div class="lbl">Capabilities</div></div>
      <div class="card"><div class="num">${mkt.length}</div><div class="lbl">Marketplace</div></div>
      <div class="card"><div class="num">${inst}</div><div class="lbl">Installed</div></div>
      <div class="card"><div class="num">${rels}</div><div class="lbl">Release Tracks</div></div>
      <div class="card"><div class="num">${compat}</div><div class="lbl">Compat. Checks</div></div>
      <div class="card"><div class="num">v${d.platform?.runtime || '?'}</div><div class="lbl">Runtime</div></div>
    </div>
    <div class="grid-2">
      <div class="glass">
        <h2>Marketplace</h2>
        <table>${mkt.slice(0,5).map(p => `<tr><td><strong>${p.capability_id}</strong></td><td><span class="badge badge-blue">v${p.artifact_version}</span></td><td style="color:var(--text3)">${p.license||'MIT'}</td></tr>`).join('')}</table>
        ${mkt.length > 5 ? `<div style="color:var(--text3);font-size:12px;margin-top:8px">${mkt.length} total — <a href="#" onclick="showPage('marketplace');return false" style="color:var(--amber)">view all →</a></div>` : ''}
      </div>
      <div class="glass">
        <h2>Release Center</h2>
        ${Object.keys(d.releases||{}).length === 0 ? '<div class="empty">No releases tracked.</div>' :
        `<table>${Object.entries(d.releases||{}).slice(0,5).map(([id,r]) => `<tr><td><strong>${id}</strong></td><td><span class="badge badge-${r.current_stage==='production'?'green':r.current_stage==='draft'?'yellow':'blue'}">${r.current_stage}</span></td><td style="color:var(--text3)">v${r.current_version}</td></tr>`).join('')}</table>`}
      </div>
    </div>`;
}

// ── Apps ──
function renderApps() {
  const inst = DATA.installed || {};
  const entries = Object.entries(inst);
  document.getElementById('page-apps').innerHTML = `
    <h1><span class="accent">//</span> Applications</h1>
    ${entries.length === 0 ? '<div class="empty">No packages installed. Use <code>aeaos install &lt;package&gt;</code>.</div>' : `
    <div class="glass"><table><tr><th>Package</th><th>Version</th><th>Installed At</th></tr>
    ${entries.map(([id, e]) => `<tr><td><strong>${id}</strong></td><td><span class="badge badge-blue">v${e.version}</span></td><td style="color:var(--text3)">${e.installed_at||'-'}</td></tr>`).join('')}
    </table></div>`}`;
}

// ── Capabilities ──
function renderCapabilities() {
  const caps = DATA.capabilities || [];
  document.getElementById('page-capabilities').innerHTML = `
    <h1><span class="accent">//</span> Capability Registry</h1>
    <div class="glass"><table><tr><th>ID</th><th>Name</th><th>Version</th><th>Kind</th><th>Status</th></tr>
    ${caps.map(c => `<tr><td><strong>${c.id}</strong></td><td style="color:var(--text2)">${c.name}</td><td><span class="badge badge-blue">v${c.version}</span></td><td><span class="badge badge-amber">${c.kind}</span></td><td><span class="badge badge-green">${c.status||'published'}</span></td></tr>`).join('')}
    </table></div>`;
}

// ── Marketplace ──
function renderMarketplace() {
  const pkgs = DATA.marketplace || [];
  document.getElementById('page-marketplace').innerHTML = `
    <h1><span class="accent">//</span> Marketplace <span style="color:var(--text3);font-family:'Inter Tight',sans-serif;font-weight:400">(${pkgs.length})</span></h1>
    <div class="glass"><table><tr><th>Package</th><th>Version</th><th>Rating</th><th>Quality</th></tr>
    ${pkgs.map(p => `<tr><td><strong>${p.capability_id}</strong></td><td><span class="badge badge-blue">v${p.artifact_version}</span></td><td>${starRating(p.rating?.score||5)}</td><td>${p.quality_gate?.passed ? '<span class="status-dot on"></span>Pass' : '<span class="status-dot off"></span>Fail'}</td></tr>`).join('')}
    </table></div>`;
}

// ── Releases ──
function renderReleases() {
  const rels = DATA.releases || {};
  const entries = Object.entries(rels);
  document.getElementById('page-releases').innerHTML = `
    <h1><span class="accent">//</span> Release Center</h1>
    ${entries.length === 0 ? '<div class="empty">No releases tracked. Use <code>aeaos release promote</code>.</div>' : `
    <div class="glass"><table><tr><th>Package</th><th>Stage</th><th>Version</th><th>Canary</th></tr>
    ${entries.map(([id, r]) => `<tr><td><strong>${id}</strong></td><td><span class="badge ${r.current_stage==='production'?'badge-green':r.current_stage==='canary'?'badge-yellow':'badge-blue'}">${r.current_stage}</span></td><td style="color:var(--text3)">v${r.current_version}</td><td style="color:var(--text3)">${r.canary_percent||0}%</td></tr>`).join('')}
    </table></div>`}`;
}

// ── Registry ──
function renderRegistry() {
  document.getElementById('page-registry').innerHTML = `
    <h1><span class="accent">//</span> Everything Registry</h1>
    <div class="glass">
      <p style="color:var(--text3);margin-bottom:16px;font-size:13px">PE-0: Capability sub-registry · ${(DATA.capabilities||[]).length} entries · Platform v${DATA.platform?.version||'?'}</p>
      <pre>${JSON.stringify({capability_count: (DATA.capabilities||[]).length, platform: DATA.platform, installed_count: Object.keys(DATA.installed||{}).length}, null, 2)}</pre>
    </div>`;
}

// ── Compatibility ──
function renderCompatibility() {
  const compat = DATA.compatibility || {};
  const results = compat.results || [];
  document.getElementById('page-compatibility').innerHTML = `
    <h1><span class="accent">//</span> Compatibility Matrix</h1>
    <div class="grid-2" style="margin-bottom:20px">
      <div class="card"><div class="lbl" style="margin-bottom:4px">Platform Baseline</div><div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text)">kernel ${compat.baseline?.kernel||'?'} · runtime ${compat.baseline?.runtime||'?'} · sdk ${compat.baseline?.sdk||'?'}</div></div>
      <div class="card"><div class="num">${results.length}</div><div class="lbl">Capabilities Compatible</div></div>
    </div>
    <div class="glass"><table><tr><th>Capability</th><th>Status</th></tr>
    ${results.map(r => `<tr><td><strong>${r.capability}</strong></td><td>${r.compatible ? '<span class="badge badge-green">✅ Compatible</span>' : '<span class="badge badge-red">❌ Incompatible</span>'}</td></tr>`).join('')}
    </table></div>`;
}

// ── Helpers ──
function starRating(s) {
  const f = Math.round(s/5*5);
  return '<span style="color:var(--amber)">'+'★'.repeat(f) + '☆'.repeat(5-f)+'</span><span style="color:var(--text3);margin-left:4px">'+s+'</span>';
}

load();
</script>
</body>
</html>
